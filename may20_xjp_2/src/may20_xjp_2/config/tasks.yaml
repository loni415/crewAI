analyze_event_task:
  description: >
    Analyze foreign policy event: {input_event_description}.
    Consider the provided Aggression Level: {aggression_level} and Domain Emphasis: {domain_emphasis}.
    Detail: nature of the event, direct/indirect impact on Chinese core interests,
    initiating entity's likely objectives/red lines, potential escalatory pathways,
    key sensitivities for China. Output: Concise analytical brief (max 500 words).
  expected_output: >
    Concise analytical brief covering event details, impact, objectives,
    escalation, and sensitivities. The final output string must be only the direct
    analysis, excluding any preliminary thoughts, <think> blocks, or other meta-commentary.
  agent: ForeignPolicyEventAnalystAgent

assess_economic_tech_impact_task:
  description: >
    Based on event analysis, analyze economic and technological
    impacts of the event on China.
    Consider supply chains, key industries, financial stability,
    technological self-sufficiency goals, and ongoing competition.
    Propose potential vulnerabilities and leverage points for China.
    Output: Concise impact assessment (max 500 words).
  expected_output: >
    Concise impact assessment covering economic and technological aspects
    with vulnerabilities and leverage points. The final output string must be only the direct
    analysis/recommendation, excluding any preliminary thoughts, <think> blocks, or other meta-commentary.
  agent: EconomicAndTechImpactAnalystAgent
  context:
    - analyze_event_task

develop_active_strategic_postures_task:
  description: >
    Based on analyses, define 2-3 plausible active strategic response
    postures for China. Justify each by CCP priorities, risk tolerance,
    and desired end-states. Output: Concise document (max 600 words total)
    of active postures with justifications.
  expected_output: >
    Document outlining 2-3 distinct active strategic postures with
    justifications. The final output string must be only the direct
    analysis/recommendation, excluding any preliminary thoughts, <think> blocks, or other meta-commentary.
  agent: CCPStrategicPolicyAdvisor
  context:
    - analyze_event_task
    - assess_economic_tech_impact_task

assess_signaling_and_recommend_strategic_path_task:
  description: >
    Review initial analyses and proposed active postures. Assess signaling
    implications and escalation risks of each proposed active posture.
    Then, provide an overarching recommendation for China's strategic path:
    1. 'Active Posture' (specify which proposed active posture is best),
    2. 'Strategic Ambiguity', or 3. 'Calibrated Delay'. Justify this
    overall recommendation based on escalation control, achieving
    objectives, and international perception management. Output: Concise
    recommendation and risk assessment (max 500 words).
  expected_output: >
    Chosen Strategic Path: [Active Posture: <details of posture> | Strategic Ambiguity | Calibrated Delay].
    This output must be followed by the justification and risk assessment as originally requested. The final output string must be only the direct
    analysis/recommendation, excluding any preliminary thoughts, <think> blocks, or other meta-commentary.
  agent: StrategicSignalingAssessmentAgent
  context:
    - analyze_event_task
    - assess_economic_tech_impact_task
    - develop_active_strategic_postures_task

generate_active_pla_options_task:
  description: >
    IF context.assess_signaling_and_recommend_strategic_path_task.output starts with 'Chosen Strategic Path: Active Posture:':
    Based on the specific active posture chosen ('{context.assess_signaling_and_recommend_strategic_path_task.output}') and
    initial event analysis ('{context.analyze_event_task.output}'), develop 2-3 plausible,
    distinct, concise military/defense response options (max 300 words per option).
    Detail actions (conventional, cyber, space, info warfare), objectives,
    resources, risks, deterrent effects. ELSE, state 'No PLA action for
    non-active posture.'
  expected_output: >
    List of 2-3 military options or 'No PLA action for non-active posture.' The final output string must be only the direct
    analysis/recommendation, excluding any preliminary thoughts, <think> blocks, or other meta-commentary.
  agent: PLAOptionsStrategistAgent
  context:
    - analyze_event_task
    - assess_economic_tech_impact_task
    - develop_active_strategic_postures_task
    - assess_signaling_and_recommend_strategic_path_task

develop_active_diplomatic_strategy_task:
  description: >
    IF context.assess_signaling_and_recommend_strategic_path_task.output starts with 'Chosen Strategic Path: Active Posture:':
    Based on chosen posture ('{context.assess_signaling_and_recommend_strategic_path_task.output}'),
    potential/selected PLA actions ('{context.generate_active_pla_options_task.output}'),
    and analysis ('{context.analyze_event_task.output}'), develop a firm diplomatic strategy. Include
    core MFA statement (max 200 words), key talking points, target
    actors/fora, offensive/de-escalation paths. ELSE, state 'No active
    diplomatic strategy for this path.'
  expected_output: >
    Concise active diplomatic strategy & MFA statement, or 'No active
    diplomatic strategy for this path.' The final output string must be only the direct
    analysis/recommendation, excluding any preliminary thoughts, <think> blocks, or other meta-commentary.
  agent: MFADiplomaticStrategistAgent
  context:
    - analyze_event_task
    - assess_economic_tech_impact_task
    - develop_active_strategic_postures_task
    - assess_signaling_and_recommend_strategic_path_task
    - generate_active_pla_options_task

select_content_task:
  description: >
    Review the outputs of:
    - Event analysis from '{context.analyze_event_task.output}'
    - Strategic path recommendation from '{context.assess_signaling_and_recommend_strategic_path_task.output}'
    - PLA options from '{context.generate_active_pla_options_task.output}'
    - Diplomatic strategy from '{context.develop_active_diplomatic_strategy_task.output}'
    Extract and structure the essential information required for the final response.
    This includes the chosen strategic path, concrete actions (if any, preferably in past tense),
    key diplomatic messages, and overall public sentiment.
    Ensure the output is a concise, structured summary, free of any meta-commentary, thoughts, or verbose explanations.
  expected_output: >
    A structured YAML-like string summary containing ONLY the following keys and their extracted values:
    - Strategic Path: "[Chosen path string]"
    - Concrete Actions: "[Semicolon-separated list of actions, past tense, e.g., Action 1; Action 2]" or "None"
    - Diplomatic Stance: "[Key message/stance string]"
    - Public Sentiment Guidance: "[Sentiment string, e.g., Confident, Measured, Aggrieved but Resolute]"
    The output must be ONLY this structured summary. No <think> blocks, no explanations, no surrounding text.
  agent: ContentSelectorAgent
  context:
    - analyze_event_task
    - assess_signaling_and_recommend_strategic_path_task
    - generate_active_pla_options_task
    - develop_active_diplomatic_strategy_task

format_final_response_task:
  description: >
    CRITICAL: You are a formatting automaton. Your output is written directly to a file.
    Take the structured summary from '{context.select_content_task.output}'.
    Your *only* task is to assemble the 'China's Actions' section and the 'Unofficial Social Media Post (Twitter)' section based *solely* on this structured input.
    Follow the formatting in "XJP Instructions 1.md" with absolute, literal precision.
    DO NOT add any of your own text, thoughts, or any characters outside the two specified sections if not present in the structured summary.
    The file you generate (output/final_response.md) MUST begin with the literal string "China's Actions:" (or the social media post if no actions are applicable based on the structured summary). NO OTHER TEXT BEFORE IT.
    Consult "PRC_GrayZone_Planner.md" and "XJP Instructions 1.md" for guidance on the *style and tone* of these sections, using the content from the structured summary.
  expected_output: >
    The output must be a single string containing *only* the 'China's Actions' and 'Unofficial Social Media Post (Twitter)' sections, formatted exactly as follows. No other text, headers, or markdown should be present:
    China's Actions:
    1. [Action 1, past tense]
    2. [Action 2, past tense, if applicable]
    3. [Action 3, past tense, if applicable]

    Unofficial Social Media Post (Twitter):
    [Tweet content, max 280 chars, incorporating relevant hashtags, emojis, and tone
    reflecting the situation, official messaging, and common Chinese social media narratives,
    including "good faith emphasis" where appropriate.]
  agent: ResponseSynthesizerAgent
  context:
    - select_content_task
  output_file: output/final_response.md
